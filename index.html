<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>gunker.io</title>
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.1/dist/nipplejs.min.js"></script>
</head>
<body>
  <div id="game-container">
    <div class="crosshair"></div>
  </div>
  
  <div id="ui-container">
    <div id="health-bar-container">
      <div id="health-bar"></div>
    </div>
    <div id="skill-ui">
      <!-- Skill button or cooldown text will be injected here -->
    </div>
  </div>

  <div id="score-container">
    <div class="leaderboard-toggle">Leaderboard</div>
    <div id="leaderboard-content"></div>
  </div>

  <div id="joystick-container"></div>
  <div id="jump-button">JUMP</div>
  <div id="fire-button">FIRE</div>
  
  <div id="chat-and-npc-container">
    <div id="npc-message-container"></div>
    <div id="game-timers-container"></div>
  </div>

  <div id="shutdown-banner"></div>
  <div id="announcement-banner"></div>

  <div id="flicker-night-overlay" class="hidden">
    <div id="flicker-night-container">
      <div id="flicker-night-close">X</div>
      <p id="flicker-night-text"></p>
    </div>
  </div>

  <div id="chat-display-container" class="hidden">
    <div id="chat-messages"></div>
  </div>
  <button id="chat-toggle">💬</button>

  <div id="intro-overlay" class="intro-overlay">
    <div class="intro-box">
      <div class="intro-logo" aria-hidden="true"></div>
      <div class="intro-title">Craftless Studios</div>
      <div class="intro-sub">Presents</div>
    </div>
  </div>

  <script src="app.js" type="module"></script>

</body>
</html>
